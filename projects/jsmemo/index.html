        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="/global.css" />
        <link rel="stylesheet" href="./styles.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"

        <title>SKV | jsmemo</title>

    <body class="w-full h-screen overflow-hidden">
        <div id="app" class="flex w-full h-full flex-col">
            <header class="w-full">
                <div
                    class="inner-header flex gap-3 justify-between items-center p-9 h-10 bg-black-500/1 backdrop-blur-md rounded-xl"
                >
                    <p class="logo-container flex gap-2">
                        <span class="skv font-cerebri">SKV</span>
                        <span class="vertical-line font-cerebri"></span>
                        <span class="JS-memo-text-logo font-cerebri"
                            >jsmemo</span
                        >
                        <span class="version font-cerebri">1.0</span>
                    </p>
                    <p class="knowladge-block">
                        <span class="font-cerebri"> Knowladge Score:</span
                        ><span class="testScore font-cerebri"></span>
                    </p>
                    <p class="back-to-tool-hub font-cerebri">
                        Back to SKV.tools
                    </p>
                </div>
            </header>
            <div class="sidebar-tooltip flex">

                    id="sidebar"
                    class="w-95 h-200 bg-black-500/1 backdrop-blur-md border-2 rounded-2xl border-[#45527F] p-6 flex flex-col gap-6 shrink-0 ml-10 shadow-[inset_0_0_40px_rgba(69,82,127,0.5)]"

                        id="logo"
                        class="flex items-center content-baseline gap-5"
                    >
                        <img
                            class="w-10 h-10 bg-[#45527F] rounded-1xl"
                            src="./assets/logo-jsmemo.png"
                            alt="jsmemo logo"

                        <span
                            class="text-neon-cyan drop-shadow-neon-cyan font-mono font-bold text-3xl"

                            >
                                <input
                                    type="text"
                                    id="searchInput"
                                    placeholder="Search..."
                                    class="bg-transparent border-none outline-none text-sm text-content-primary placeholder:text-content-muted w-full focus:ring-0"
                                />
                                <svg
                                    class="w-4 h-4 text-neon-cyan/60 group-focus-within:text-neon-cyan"
                                    fill="none"
                                    stroke="currentColor"
                                    viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        stroke-width="2"
                                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                                    ></path>
                                </svg>
                            </div>
                        </div>
